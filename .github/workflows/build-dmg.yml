name: Build macOS DMG

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
            dmg_name: capacity-cleaning-arm64.dmg
          - arch: x64
            runner: macos-26-intel
            dmg_name: capacity-cleaning-x64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build app and DMG
        env:
          DMG_NAME: ${{ matrix.dmg_name }}
        run: scripts/package_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dmg_name }}
          path: dist/${{ matrix.dmg_name }}
          if-no-files-found: error

  release:
    name: Attach DMGs to Release
    needs: build-dmg
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: capacity-cleaning-*.dmg
          path: dist
          merge-multiple: true

      - name: Attach DMGs to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_title="${GITHUB_REF_NAME}"
            release_notes="capacity-cleaning macOS DMG"
          else
            short_sha="${GITHUB_SHA::7}"
            release_tag="master-${short_sha}"
            release_title="master ${short_sha}"
            release_notes="Automated DMG build from master at ${GITHUB_SHA}."
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/*.dmg --clobber
          else
            gh release create "${release_tag}" dist/*.dmg \
              --target "${GITHUB_SHA}" \
              --title "${release_title}" \
              --notes "${release_notes}"
          fi
