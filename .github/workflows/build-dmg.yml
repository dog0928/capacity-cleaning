release:
  name: Attach DMGs to Release
  needs: build-dmg
  if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
  runs-on: ubuntu-latest

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download DMG artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: capacity-cleaning-*.dmg
        path: dist
        merge-multiple: true

    - name: Attach DMGs to GitHub Release
      working-directory: ${{ github.workspace }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          release_tag="${GITHUB_REF_NAME}"
          release_title="${GITHUB_REF_NAME}"
          release_notes="capacity-cleaning macOS DMG"
        else
          short_sha="${GITHUB_SHA::7}"
          release_tag="master-${short_sha}"
          release_title="master ${short_sha}"
          release_notes="Automated DMG build from master at ${GITHUB_SHA}."
        fi

        if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
          gh release upload "${release_tag}" dist/*.dmg --clobber --repo "${GITHUB_REPOSITORY}"
        else
          gh release create "${release_tag}" dist/*.dmg \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${release_title}" \
            --notes "${release_notes}"
        fi
